<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="site-title">Posts - Android Technology for Blind International</title>
    <style>
        /* Accessible styling with strong color contrast */
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            background-color: #ffffff;
            color: #111111;
            margin: 0;
            padding: 20px;
        }
        header, nav, main, footer {
            margin-bottom: 20px;
            padding: 10px;
        }
        nav a {
            display: inline-block;
            padding: 10px 15px;
            margin-right: 10px;
            background-color: #0056b3;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
        }
        nav a.active {
            background-color: #111111;
            outline: 2px solid #0056b3;
        }
        nav a:focus, nav a:hover, .back-btn:focus {
            background-color: #003d7a;
            outline: 3px solid #ffcc00;
        }
        .time-display {
            font-weight: bold;
            margin: 10px 0;
            padding: 5px;
            background-color: #f0f0f0;
            display: inline-block;
        }
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
        .post-list {
            list-style: none;
            padding: 0;
        }
        .post-item {
            margin-bottom: 20px;
            padding: 15px;
            border-bottom: 1px solid #cccccc;
        }
        .post-link, .back-btn {
            font-size: 1.25rem;
            color: #0056b3;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
        }
        .post-link:focus, .post-link:hover {
            text-decoration: underline;
            outline: 3px solid #ffcc00;
        }
        .post-date {
            display: block;
            color: #555555;
            font-size: 0.95rem;
            margin-top: 5px;
        }
        .back-btn {
            margin-bottom: 20px;
            background-color: #f0f0f0;
            padding: 8px 12px;
            border-radius: 4px;
            color: #333;
        }
        footer {
            border-top: 2px solid #333;
            margin-top: 40px;
            padding-top: 20px;
        }
        .footer-heading {
            font-size: 1.2rem;
            margin-bottom: 15px;
            color: #333333;
        }
        footer a {
            display: inline-block;
            margin-right: 15px;
            margin-bottom: 10px;
            color: #0056b3;
            font-weight: bold;
        }
        footer a:focus {
            outline: 3px solid #ffcc00;
        }
    </style>
</head>
<body>

    <header role="banner">
        <h1>Android Technology for Blind International</h1>
        <p>Welcome to the official website of ATBI.</p>
        
        <div class="time-display">
            <span id="accessible-time">Loading device time...</span>
            <span id="visual-time" aria-hidden="true" style="display: none;"></span>
        </div>

        <nav role="navigation" aria-label="Main Navigation">
            <a href="index.html">Home</a>
            <a href="tools.html">Tools</a>
            <a href="posts.html" class="active" aria-current="page">Posts</a>
        </nav>
    </header>

    <hr aria-hidden="true">

    <main role="main" id="content-workspace">
        </main>

    <hr aria-hidden="true">

    <footer role="contentinfo">
        <h2 class="footer-heading">Community Links & Support</h2>
        <a href="https://t.me/TeamATBI_Channel" target="_blank" rel="noopener">Join our Telegram Channel</a>
        <a href="https://t.me/ATBI_TeamAdmin_Support_bot" target="_blank" rel="noopener">Contact and Support</a>
        <a href="https://telegra.ph/Official-Group-Regulations-by-ATBI-Admin-07-05" target="_blank" rel="noopener" aria-label="Read our group rules (opens in a new tab)">Read our group rules</a>
        <a href="https://surveyheart.com/form/6a4e244f670f7d5be2c5ab81" target="_blank" rel="noopener" aria-label="Join our team (opens in a new tab)">Join our team</a>
    </footer>

    <script>
        const GITHUB_USERNAME = "teamatbi"; 
        const REPO_NAME = "teamatbi.github.io"; 
        const formatOptions = { hour: '2-digit', minute: '2-digit' };
        
        let cachedPostsArray = null;

        // 1. ROUTER PIPELINE: Tracks whether to show the list view or open a specific post file
        async function routeViewer() {
            const workspace = document.getElementById('content-workspace');
            const currentHash = window.location.hash.replace('#', '');

            // View A: Main List (No file hash in URL)
            if (!currentHash || currentHash === "") {
                document.getElementById('site-title').textContent = "Posts - Android Technology for Blind International";
                workspace.innerHTML = `
                    <h2>Our Official Articles and Updates</h2>
                    <p>Browse our latest publications below. Click on any heading to read the full article.</p>
                    <ul class="post-list" id="posts-container">
                        <li>Scanning repository for available articles...</li>
                    </ul>
                `;
                await displaySortedList();
                return;
            }

            // View B: Dynamic Post Loader (File hash detected)
            await loadStandaloneArticle(currentHash);
        }

        // 2. AUTOMATIC POST SCANNER AND DESCENDING DATE SORTING Engine
        async function displaySortedList() {
            const container = document.getElementById('posts-container');
            
            if (window.location.protocol === "file:") {
                container.innerHTML = `<li><strong>Local Mode Active:</strong> Push this code folder to GitHub to run the automatic chronological sorting.</li>`;
                return;
            }

            try {
                if (!cachedPostsArray) {
                    const response = await fetch(`https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/posts`);
                    if (!response.ok) throw new Error('Could not read posts folder');
                    
                    const files = await response.json();
                    const postFiles = files.filter(f => f.name.endsWith('.html') && f.name !== 'index.html');

                    cachedPostsArray = await Promise.all(postFiles.map(async (file) => {
                        try {
                            const commitResponse = await fetch(`https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/commits?path=posts/${file.name}&page=1&per_page=1`);
                            const commitData = await commitResponse.json();
                            
                            let rawDate = new Date(0); 
                            if (commitData && commitData[0]) {
                                rawDate = new Date(commitData[0].commit.committer.date);
                            }
                            return { ...file, commitDate: rawDate };
                        } catch (e) {
                            return { ...file, commitDate: new Date(0) };
                        }
                    }));

                    // Sort descending (latest to oldest)
                    cachedPostsArray.sort((a, b) => b.commitDate - a.commitDate);
                }

                container.innerHTML = ""; 

                cachedPostsArray.forEach(file => {
                    const listItem = document.createElement('li');
                    listItem.className = "post-item";

                    const displayTitle = file.name.replace('.html', '').replace(/-/g, ' ').replace(/^\w/, c => c.toUpperCase());
                    
                    let dateString = "Available";
                    if (file.commitDate.getTime() !== 0) {
                        dateString = file.commitDate.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
                    }

                    // Creates a URL hash link (e.g., #extension-introduction.html)
                    listItem.innerHTML = `
                        <a href="#${file.name}" class="post-link">${displayTitle}</a>
                        <span class="post-date">Published on: ${dateString}</span>
                    `;
                    container.appendChild(listItem);
                });

            } catch (err) {
                container.innerHTML = `<li style="color:red;">Error connecting to GitHub repository index. Make sure the repository is Public.</li>`;
            }
        }

        [span_1](start_span)// 3. BLIND TECH HUB STRATEGY: Fetches the file and strips the body content[span_1](end_span)
        async function loadStandaloneArticle(fileName) {
            const workspace = document.getElementById('content-workspace');
            const readableTitle = fileName.replace('.html', '').replace(/-/g, ' ').replace(/^\w/, c => c.toUpperCase());
            
            document.getElementById('site-title').textContent = `${readableTitle} - ATBI`;

            try {
                // Fetch the file directly from the posts folder
                const response = await fetch(`posts/${fileName}`);
                if (!response.ok) throw new Error('Target post file missing');
                const rawHtmlData = await response.text();

                [span_2](start_span)// Parse the complete HTML document to extract its <body> content[span_2](end_span)
                const parser = new DOMParser();
                const doc = parser.parseFromString(rawHtmlData, 'text/html');
                const articleBodyContent = doc.body ? doc.body.innerHTML : rawHtmlData;

                [span_3](start_span)// Inject the article content into the ATBI workspace along with a back button[span_3](end_span)
                workspace.innerHTML = `
                    <a href="#" class="back-btn" aria-label="Return to articles list">← Back to Posts</a>
                    <div class="article-wrapper" id="article-focus-target">
                        ${articleBodyContent}
                    </div>
                `;

                // Accessibility focus management for TalkBack
                const focusTarget = document.getElementById('article-focus-target');
                if (focusTarget) {
                    focusTarget.setAttribute('tabindex', '-1');
                    focusTarget.focus();
                }

            } catch (err) {
                workspace.innerHTML = `
                    <a href="#" class="back-btn">← Back to Posts</a>
                    <h2 style="color:red;">Error Loading Post</h2>
                    <p>Could not load the file: "posts/${fileName}". Please verify its spelling in your repository.</p>
                `;
            }
        }

        // 4. SILENT DEVICE TIME TRACKING ENGINE
        function initializeTime() {
            const now = new Date();
            const timeString = now.toLocaleTimeString([], formatOptions);
            const accessibleElement = document.getElementById('accessible-time');
            const visualElement = document.getElementById('visual-time');

            accessibleElement.textContent = "Page loaded at device time: " + timeString;
            visualElement.textContent = "Device time: " + timeString;
            visualElement.style.display = "inline";

            setInterval(updateVisualTime, 60000);
        }

        function updateVisualTime() {
            const now = new Date();
            const timeString = now.toLocaleTimeString([], formatOptions);
            const visualElement = document.getElementById('visual-time');
            const accessibleElement = document.getElementById('accessible-time');
            
            visualElement.textContent = "Device time: " + timeString;

            if (!accessibleElement.classList.contains('sr-only')) {
                accessibleElement.classList.add('sr-only');
                accessibleElement.textContent = "Device time when page loaded: " + timeString;
            }
        }

        [span_4](start_span)// Listen for address hash changes to switch views fluidly[span_4](end_span)
        window.addEventListener('hashchange', routeViewer);

        document.addEventListener('DOMContentLoaded', () => {
            initializeTime();
            routeViewer();
        });
    </script>
</body>
</html>
